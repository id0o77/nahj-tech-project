{% extends "base.html" %}
{% block title %}{{ t.login_title }}{% endblock %}
{% block content %}<section class="section form-page"><form class="glass-card form-box small" method="post"><input type="hidden" name="_csrf" value="{{ csrf_token() }}"><img class="login-logo" src="{{ url_for('static', filename='img/logo.png') }}" alt="logo"><span class="badge">Admin</span><h1>{{ t.login_title }}</h1><input name="username" placeholder="{{ t.username }}" required><input name="password" type="password" placeholder="{{ t.password }}" required><button type="submit">{{ t.login }}</button><p class="muted">{{ t.default_account }}</p></form></section>{% endblock %}
