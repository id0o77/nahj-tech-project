{% extends "base.html" %}
{% block title %}{{ service.name }}{% endblock %}
{% block content %}<section class="section detail-grid top-space"><div class="glass-card detail-box"><span class="badge">{{ service.icon }} {{ t.services }}</span><h1>{{ service.name }}</h1><p>{{ service.description }}</p><p><strong>{{ t.price }}:</strong> {{ service.price }}</p><p><strong>{{ t.status }}:</strong> {{ service.status }}</p><a class="btn" href="{{ url_for('contact') }}">{{ t.start_now }}</a></div></section>{% endblock %}
