{% extends "base.html" %}
{% block title %}{{ form_title }}{% endblock %}
{% block content %}<section class="section form-page"><form class="glass-card form-box" method="post"><input type="hidden" name="_csrf" value="{{ csrf_token() }}"><h1>{{ form_title }}</h1><label>{{ t.service_name }}<input name="name" value="{{ service.name if service else '' }}" required maxlength="80"></label><label>{{ t.description }}<textarea name="description" required maxlength="400">{{ service.description if service else '' }}</textarea></label><label>{{ t.price }}<input name="price" value="{{ service.price if service else '' }}"></label><label>{{ t.icon }}<input name="icon" value="{{ service.icon if service else '✦' }}"></label><label>{{ t.status }}<select name="status"><option value="active" {% if service and service.status == 'active' %}selected{% endif %}>active</option><option value="inactive" {% if service and service.status == 'inactive' %}selected{% endif %}>inactive</option></select></label><button type="submit">{{ t.save }}</button></form></section>{% endblock %}
